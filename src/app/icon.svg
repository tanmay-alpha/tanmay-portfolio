<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!--
    Favicon: a Fraunces-italic "T" with a rust accent dot, on a transparent
    background. Renders at 16/32/180/192px in browsers. We use a system
    serif italic as the visual proxy (browsers can't pull self-hosted
    fonts into favicons); at small sizes the difference is invisible.
  -->
  <text
    x="32"
    y="44"
    text-anchor="middle"
    font-family="'Times New Roman', 'Times', Georgia, serif"
    font-style="italic"
    font-weight="600"
    font-size="48"
    fill="#FAFAF7"
  >T</text>
  <circle cx="46" cy="44" r="3.5" fill="#D97757" />
</svg>
